name: Build Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    name: Android Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: gradle/gradle-build-action@v3
      - name: Build Android
        run: ./gradlew :composeApp:assembleDebug

  build-web:
    name: Web (Wasm) Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: gradle/gradle-build-action@v3
      - name: Build Wasm
        run: ./gradlew :composeApp:wasmJsBrowserDistribution

  build-ios:
    name: iOS Build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: gradle/gradle-build-action@v3
      - name: Build iOS Framework
        run: ./gradlew :shared:assembleDebugXCFramework
